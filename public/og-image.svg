<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-opacity="0.4" />
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  
  <!-- Decorative Circles -->
  <circle cx="1000" cy="100" r="300" fill="#ffffff" opacity="0.05" />
  <circle cx="200" cy="500" r="200" fill="#ffffff" opacity="0.05" />
  
  <!-- Text -->
  <text x="120" y="280" font-family="system-ui, sans-serif" font-size="84" font-weight="800" fill="#ffffff">TaskxEarn MW</text>
  <text x="120" y="360" font-family="system-ui, sans-serif" font-size="36" font-weight="400" fill="#c7d2fe">Earn money honestly through daily tasks.</text>
  <text x="120" y="420" font-family="system-ui, sans-serif" font-size="32" font-weight="600" fill="#fcd34d">Fast Payouts • Easy Tasks • Malawi</text>
  
  <!-- Icon Graphic -->
  <g transform="translate(800, 165) scale(0.6)" filter="url(#shadow)">
    <rect width="512" height="512" rx="112" fill="#ffffff" />
    <rect x="116" y="166" width="280" height="180" rx="32" fill="#4f46e5" />
    <path d="M116 220 Q 256 280 396 220 L 396 198 Q 256 258 116 198 Z" fill="#3730a3" />
    <circle cx="256" cy="256" r="48" fill="url(#coin)" />
    <path d="M236 256 l 12 12 l 28 -28" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
</svg>
